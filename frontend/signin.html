<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Entry | The Princess Network</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500;600;700&family=Jost:wght@200;300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        :root {
            --royal-bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--royal-bg);
            font-family: 'Jost', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #c4848a;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #d4af37;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 100px) scale(1.1);
            }
        }

        .signin-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signin-card {
            background: rgba(255, 255, 255, 0.08);
            /* More opaque */
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 60px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand-logo {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: #ef6bf8;
            letter-spacing: 4px;
            margin-bottom: 40px;
            display: block;
            text-decoration: none;
        }

        .signin-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: #d4af37;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .signin-header p {
            color: #d4af37;
            /* Brighter */
            font-size: 14px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #d4af37;
            /* Pure white for maximum visibility */
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            margin-left: 12px;
            font-weight: 600;
            /* Bolder */
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            /* Fixed: White text on dark bg */
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .brand-logo {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: #d4af37;
            /* Fixed: Gold instead of pink */
            letter-spacing: 4px;
            margin-bottom: 40px;
            display: block;
            text-decoration: none;
        }

        .btn-submit {
            width: 100%;
            background: #d4af37;
            color: #1a1a1a;
            /* Darker text on gold button */
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
    </style>
  <script src="scripts/config.js"></script>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <a href="index.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Back to Gallery
    </a>

    <div class="signin-container">
        <div class="signin-card">
            <a href="index.html" class="brand-logo">PRINCESS</a>
            <div class="signin-header">
                <h1>Royal Access</h1>
                <p>Welcome back to the inner circle.</p>
            </div>

            <form id="signinPageForm" onsubmit="handleSigninPage(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signinEmail" placeholder="your@palace.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="signinPassword" placeholder="••••••••" required
                            style="padding-right: 50px;">
                        <button type="button" onclick="togglePass('signinPassword', this)"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #d4af37; display: flex; align-items: center; justify-content: center; padding: 5px;">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Enter Palace ✧</button>
            </form>

            <div class="signin-footer">
                New to the Circle? <a href="signup.html">Create Account</a>
            </div>
        </div>
    </div>

    <div id="feedbackOverlay" class="royal-feedback-overlay">
        <div class="royal-feedback-card">
            <span class="royal-icon" id="feedbackIcon">♛</span>
            <h2 id="feedbackTitle">Success</h2>
            <p id="feedbackMsg">Message goes here.</p>
            <button class="royal-btn-primary" onclick="closeFeedback()">Acknowledge ♛</button>
        </div>
    </div>

    <script type="module">
        import { signIn } from './scripts/auth.js';

        window.togglePass = function (id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('svg');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        };

        function showFeedback(title, msg, type = 'success') {
            const overlay = document.getElementById('feedbackOverlay');
            document.getElementById('feedbackTitle').textContent = title;
            document.getElementById('feedbackMsg').textContent = msg;
            document.getElementById('feedbackIcon').textContent = type === 'success' ? '♛' : '✕';
            overlay.classList.add('show');
        }

        window.closeFeedback = function () {
            const overlay = document.getElementById('feedbackOverlay');
            overlay.classList.remove('show');
            if (document.getElementById('feedbackTitle').textContent === 'Welcome Back') {
                window.location.href = 'index.html';
            }
        };

        window.handleSigninPage = async function (e) {
            e.preventDefault();
            const email = document.getElementById('signinEmail').value;
            const password = document.getElementById('signinPassword').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;

            btn.disabled = true;
            btn.textContent = 'Verifying...';

            const { data, error } = await signIn(email, password);

            if (error) {
                showFeedback('Royal Oversight', error.message, 'error');
                btn.disabled = false;
                btn.textContent = originalText;
            } else {
                showFeedback('Welcome Back', 'The palace doors are open for you once again.', 'success');
            }
        };
    </script>
</body>

</html>
