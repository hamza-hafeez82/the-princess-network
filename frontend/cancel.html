<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Cancelled | The Princess Network</title>
    <link rel="stylesheet" href="styles/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #fdf6f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .cancel-card {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 25px;
            display: inline-block;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #1a1a1a;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        p {
            font-family: 'Jost', sans-serif;
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-back {
            font-family: 'Cinzel', serif;
            background: #1a1a1a;
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #c4848a;
        }
    </style>
  <script src="scripts/config.js"></script>
</head>

<body>
    <div class="cancel-card">
        <div class="icon">➴</div>
        <h1>Journey Resumed</h1>
        <p>The checkout process was cancelled. Your selection is still safe in your royal bag.</p>
        <a href="checkout.html" class="btn-back">Back to Checkout</a>
    </div>
</body>

</html>
