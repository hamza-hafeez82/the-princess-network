<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palace Order Management | The Princess Network</title>
    <link rel="stylesheet" href="styles/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #b2935d;
            --ink: #111;
            --gray: #666;
            --bg: #fffaf6;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: 'Jost', sans-serif;
            margin: 0;
            padding: 0;
        }

        .admin-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 40px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .admin-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .order-card {
            background: #fff;
            border: 1px solid rgba(196, 132, 138, 0.15);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s ease;
        }

        .order-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: 20px;
        }

        .order-id {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: var(--gold);
        }

        .order-status-badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-paid {
            background: #dcfce7;
            color: #166534;
        }

        .status-shipped {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-delivered {
            background: #f3e8ff;
            color: #6b21a8;
        }

        .status-completed {
            background: #f0fdf4;
            color: #166534;
        }

        .order-details {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .order-items ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .order-items li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
            font-size: 14px;
        }

        .admin-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: 'Jost', sans-serif;
        }

        .notes-area {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            min-height: 80px;
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            resize: none;
        }

        .save-btn {
            background: var(--ink);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .save-btn:hover {
            background: var(--gold);
        }

        @media (max-width: 768px) {
            .order-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <header class="admin-header">
            <p
                style="color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-size: 12px; margin-bottom: 10px;">
                Curator Dashboard</p>
            <h1>Palace Orders</h1>
        </header>

        <div id="ordersList">
            <!-- Orders will be loaded here -->
            <div style="text-align: center; padding: 100px; color: var(--gray);">Summoning order records... ✨</div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './scripts/auth.js';

        async function initAdmin() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'signin.html';
                return;
            }

            loadOrders(user.id);
        }

        async function loadOrders(userId) {
            try {
                const res = await fetch(`http://localhost:3000/api/admin/orders`, {
                    headers: { 'x-user-id': userId }
                });

                if (!res.ok) {
                    document.getElementById('ordersList').innerHTML = `
                        <div style="text-align: center; padding: 50px; background: #fff; border-radius: 20px; border: 1px solid rgba(255,0,0,0.1);">
                            <h3 style="color: var(--ink);">Access Denied</h3>
                            <p style="color: var(--gray);">Only palace administrators may access these scrolls.</p>
                            <a href="index.html" style="color: var(--gold); text-decoration: none; font-weight: 600;">Return to Palace →</a>
                        </div>
                    `;
                    return;
                }

                const orders = await res.json();
                renderOrders(orders);
            } catch (err) {
                console.error('Admin Error:', err);
            }
        }

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');
            if (orders.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: var(--gray);">No royal orders found.</div>';
                return;
            }

            list.innerHTML = orders.map(order => `
                <div class="order-card" id="order-${order.id}">
                    <div class="order-meta">
                        <div>
                            <span class="order-id">ORD-${order.id.slice(0, 8).toUpperCase()}</span>
                            <div style="font-size: 12px; color: var(--gray); margin-top: 4px;">Placed on ${new Date(order.created_at).toLocaleDateString()}</div>
                        </div>
                        <span class="order-status-badge status-${order.status.replace(' ', '-')}">${order.status}</span>
                    </div>
                    
                    <div class="order-details">
                        <div class="order-items">
                            <h4 style="font-size: 14px; margin-bottom: 10px;">Customer: ${order.customer_email}</h4>
                            <ul>
                                ${order.items.map(item => `
                                    <li>
                                        <span>${item.name} x${item.qty}</span>
                                        <span>$${(item.price * item.qty).toFixed(2)}</span>
                                    </li>
                                `).join('')}
                            </ul>
                            <div style="display: flex; justify-content: space-between; margin-top: 15px; font-weight: 700; font-size: 16px;">
                                <span>Royal Total</span>
                                <span>$${order.total_amount.toFixed(2)}</span>
                            </div>
                            <div style="margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 12px; font-size: 12px; color: var(--gray);">
                                <strong>Shipping To:</strong><br>
                                ${order.shipping_address?.name}<br>
                                ${order.shipping_address?.line1}, ${order.shipping_address?.city}, ${order.shipping_address?.state} ${order.shipping_address?.postal_code}, ${order.shipping_address?.country}
                            </div>
                        </div>

                        <div class="admin-actions">
                            <div>
                                <label style="font-size: 12px; color: var(--gray); display: block; margin-bottom: 5px;">Transition Status</label>
                                <select class="status-select" id="status-${order.id}">
                                    <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                    <option value="in review" ${order.status === 'in review' ? 'selected' : ''}>In Review</option>
                                    <option value="paid" ${order.status === 'paid' ? 'selected' : ''}>Paid</option>
                                    <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                    <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                    <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                                    <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-size: 12px; color: var(--gray); display: block; margin-bottom: 5px;">Internal Notes</label>
                                <textarea class="notes-area" id="notes-${order.id}" placeholder="Special instructions for curators...">${order.admin_notes || ''}</textarea>
                            </div>
                            <button class="save-btn" onclick="window.updateOrderStatus('${order.id}')">Update Order ♛</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.updateOrderStatus = async (orderId) => {
            const status = document.getElementById(`status-${orderId}`).value;
            const notes = document.getElementById(`notes-${orderId}`).value;
            const { data: { user } } = await supabase.auth.getUser();

            try {
                const res = await fetch(`http://localhost:3000/api/admin/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-user-id': user.id
                    },
                    body: JSON.stringify({ status, adminNotes: notes })
                });

                if (res.ok) {
                    alert('Royal order updated successfully!');
                    window.location.reload();
                } else {
                    alert('The palace was unable to update this record.');
                }
            } catch (err) {
                console.error('Update Error:', err);
            }
        };

        initAdmin();
    </script>
</body>

</html>
